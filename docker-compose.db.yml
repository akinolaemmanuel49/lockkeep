services:
  traefik:
    image: traefik:v3.7
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - lockkeep-network

  mongo1:
    image: mongo
    command:
      - sh
      - -c
      - |
        cp /tmp/mongo-keyfile /etc/mongo-keyfile &&
        chmod 400 /etc/mongo-keyfile &&
        exec mongod --replSet rs0 --bind_ip_all --keyFile /etc/mongo-keyfile
    restart: always
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - 27017:27017
    networks:
      - lockkeep-network
    volumes:
      - ./secrets/mongo-keyfile:/tmp/mongo-keyfile:ro
      - mongo1:/data/db

  mongo2:
    image: mongo
    command:
      - sh
      - -c
      - |
        cp /tmp/mongo-keyfile /etc/mongo-keyfile &&
        chmod 400 /etc/mongo-keyfile &&
        exec mongod --replSet rs0 --bind_ip_all --keyFile /etc/mongo-keyfile
    restart: always
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - 27018:27017
    networks:
      - lockkeep-network
    volumes:
      - ./secrets/mongo-keyfile:/tmp/mongo-keyfile:ro
      - mongo2:/data/db

  mongo3:
    image: mongo
    command:
      - sh
      - -c
      - |
        cp /tmp/mongo-keyfile /etc/mongo-keyfile &&
        chmod 400 /etc/mongo-keyfile &&
        exec mongod --replSet rs0 --bind_ip_all --keyFile /etc/mongo-keyfile
    restart: always
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - 27019:27017
    networks:
      - lockkeep-network
    volumes:
      - ./secrets/mongo-keyfile:/tmp/mongo-keyfile:ro
      - mongo3:/data/db

  mongo-express:
    image: mongo-express
    restart: always
    ports:
      - 8081:8081
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://root:password@mongo1:27017,mongo2:27017,mongo3:27017/admin?replicaSet=rs0
      ME_CONFIG_BASICAUTH_ENABLED: true
      ME_CONFIG_BASICAUTH_USERNAME: mongoexpressuser
      ME_CONFIG_BASICAUTH_PASSWORD: mongoexpresspass
    networks:
      - lockkeep-network

networks:
  lockkeep-network:
    external: true

volumes:
  mongo1:
  mongo2:
  mongo3:
